# OCS-enabled counterpart for comparison — same workload, OCS pipeline mode
extends: synthetic_moe

ocs:
  enabled: true
  max_circuits: 8
  reconfig_time_us: 50.0
  circuit_latency_us: 1.0
  circuit_bandwidth_gbps: 200.0
  placement_strategy: round_robin

runtime:
  mode: ocs_pipeline
  num_steps: 5

# Disable flat delay so OCS provides the only delay model
delay:
  enabled: false
  comm_delay_us: 0
  comm_delay_jitter_us: 0
