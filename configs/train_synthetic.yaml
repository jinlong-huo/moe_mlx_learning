# Training config: MoE learns to route synthetic mixture-of-modes tokens.
#
# Quick start:
#   python3 -m src.launcher --config configs/train_synthetic.yaml
#
# 8 Gaussian modes, 16 experts (4/rank), top-2 routing.
# Router learns to separate modes; experts learn per-mode transforms.
# Load-balancing auxiliary loss prevents expert collapse.
# Gradient sync across ranks ensures all ranks learn the same router.

extends: synthetic_moe

world_size: 4               # 4 ranks
master_port: 29501           # use different port to avoid conflicts

model:
  num_experts: 16            # 16 experts total (4 per rank, 4 ranks)
  experts_per_rank: 4        # each rank owns 4 local experts
  hidden_dim: 64
  expert_type: ffn
  top_k: 2                   # top-2 routing provides proper gradient signal

data:
  batch_size: 32
  seq_len: 32
  num_microbatches: 2

routing:
  strategy: top2             # top-2: each token goes to 2 experts, softmax-weighted combine

runtime:
  mode: train_serial
  num_steps: 5               # steps per epoch

# Training hyperparameters
training:
  num_epochs: 30
  learning_rate: 0.01
  load_balance_alpha: 0.001
  dataset:
    num_modes: 8
    num_samples: 1024
    mode_separation: 12.0    # clearly separated but not extreme
    seed: 42

# No synthetic delay
delay:
  enabled: false
  comm_delay_us: 0
  comm_delay_jitter_us: 0

topology:
  enabled: false

profiling:
  export_trace: true
  trace_dir: "outputs/traces"
