# Realistic 16-GPU MoE cluster config
# Models a typical 2-node production setup for LLM training
#
# Topology: 2 pods × 2 nodes × 4 GPUs = 16 ranks
#   Pod 0: Node 0 (ranks 0-3), Node 1 (ranks 4-7)   -- connected via InfiniBand
#   Pod 1: Node 0 (ranks 8-11), Node 1 (ranks 12-15) -- connected via InfiniBand
#   Cross-pod: IB fabric (higher latency, lower bandwidth)
#
# Expert layout: 64 experts total, 4 per GPU
#   Rank 0  -> experts 0-3    Rank 8  -> experts 32-35
#   Rank 1  -> experts 4-7    Rank 9  -> experts 36-39
#   ...
#   Rank 7  -> experts 28-31  Rank 15 -> experts 60-63

extends: base

world_size: 16
master_port: 29500
backend: "gloo"

model:
  num_experts: 64
  experts_per_rank: 4
  hidden_dim: 512           # realistic FFN dimension
  expert_type: "ffn"        # 2-layer FFN with GELU (production expert)
  expert_hidden_mult: 4     # inner dim = 512*4 = 2048
  top_k: 2                  # top-2 gating (standard in production MoE)
  capacity_factor: 1.25

data:
  batch_size: 32
  seq_len: 128              # 4096 tokens total
  num_microbatches: 4       # 1024 tokens per micro-batch

routing:
  strategy: "top2"          # learned top-2 gating

runtime:
  mode: "overlap"
  num_steps: 10

delay:
  enabled: false            # topology handles delays instead

topology:
  enabled: true
  num_pods: 2
  nodes_per_pod: 2
  ranks_per_node: 4
  # Production-approximate numbers:
  intra_node_latency_us: 2.0       # NVLink within a DGX/HGX node
  intra_node_bandwidth_gbps: 600.0
  intra_pod_latency_us: 5.0        # InfiniBand within same rack
  intra_pod_bandwidth_gbps: 200.0
  cross_pod_latency_us: 15.0       # Cross-rack IB fabric
  cross_pod_bandwidth_gbps: 100.0
  delay_multiplier: 1.0

profiling:
  export_trace: true
  trace_dir: "outputs/traces"
