# 32-GPU MoE cluster config — stress test for mechanism verification
#
# Topology: 2 pods × 4 nodes × 4 GPUs = 32 ranks
#   Pod 0: Nodes 0-3 (ranks 0-15)   -- intra-pod via InfiniBand
#   Pod 1: Nodes 0-3 (ranks 16-31)  -- intra-pod via InfiniBand
#   Cross-pod: IB fabric
#
# Expert layout: 128 experts total, 4 per GPU
#   Rank 0  -> experts 0-3     Rank 16 -> experts 64-67
#   Rank 1  -> experts 4-7     Rank 17 -> experts 68-71
#   ...
#   Rank 15 -> experts 60-63   Rank 31 -> experts 124-127

extends: base

world_size: 32
master_port: 29500
backend: "gloo"

model:
  num_experts: 128
  experts_per_rank: 4
  hidden_dim: 256           # smaller dim for 32-process CPU stress test
  expert_type: "ffn"        # 2-layer FFN with GELU
  expert_hidden_mult: 4     # inner dim = 256*4 = 1024
  top_k: 2                  # top-2 gating
  capacity_factor: 1.25

data:
  batch_size: 16
  seq_len: 128              # 2048 tokens total
  num_microbatches: 4       # 512 tokens per micro-batch

routing:
  strategy: "top2"

runtime:
  mode: "overlap"
  num_steps: 5              # fewer steps for 32-rank stress test

delay:
  enabled: false

topology:
  enabled: true
  num_pods: 2
  nodes_per_pod: 4
  ranks_per_node: 4
  intra_node_latency_us: 2.0
  intra_node_bandwidth_gbps: 600.0
  intra_pod_latency_us: 5.0
  intra_pod_bandwidth_gbps: 200.0
  cross_pod_latency_us: 15.0
  cross_pod_bandwidth_gbps: 100.0
  delay_multiplier: 1.0

profiling:
  export_trace: true
  trace_dir: "outputs/traces"
