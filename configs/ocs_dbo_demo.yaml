# OCS Dual-Batch Overlap demo — DBO with circuit lookahead
# Requires >= 3 microbatches for full 3-deep pipeline effect

extends: synthetic_moe

ocs:
  enabled: true
  max_circuits: 16              # larger pool for DBO (more circuits in flight)
  reconfig_time_us: 100.0       # slower reconfig (beam-steering class) to show benefit
  circuit_latency_us: 1.0
  circuit_bandwidth_gbps: 400.0 # higher per-circuit BW
  placement_strategy: round_robin

runtime:
  mode: ocs_dbo                 # dual-batch overlap with circuit lookahead
  num_steps: 5

data:
  batch_size: 16
  seq_len: 64
  num_microbatches: 4           # >= 3 for DBO benefit (increased from synthetic_moe's 2)

# Disable flat delay — OCS provides its own delay model
delay:
  enabled: false
  comm_delay_us: 0
  comm_delay_jitter_us: 0
