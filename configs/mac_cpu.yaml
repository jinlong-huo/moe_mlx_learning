# Mac CPU config — inherits base, tuned for single-machine Gloo

extends: base

world_size: 4
backend: "gloo"

runtime:
  mode: "overlap"  # default to overlap mode for Mac testing

delay:
  enabled: true
  comm_delay_us: 200       # 200us ≈ realistic NIC latency
  comm_delay_jitter_us: 50  # ±50us jitter

profiling:
  export_trace: true
