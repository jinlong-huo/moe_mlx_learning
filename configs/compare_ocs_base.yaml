# Baseline for OCS comparison — identical workload and pipeline, EPS transport
# Compares overlap (EPS) vs ocs_pipeline (OCS) — same pipeline, different transport.
# This isolates the OCS circuit effect from the overlap benefit.
extends: synthetic_moe

ocs:
  enabled: false

runtime:
  mode: overlap       # same pipeline structure as ocs_pipeline — fair comparison
  num_steps: 5
