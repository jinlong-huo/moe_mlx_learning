# OCS demonstration config — extends synthetic_moe with OCS pipeline mode
# Compare traces with synthetic_moe.yaml to see OCS reconfig cost vs EPS baseline

extends: synthetic_moe

ocs:
  enabled: true
  max_circuits: 8               # small pool — forces evictions for visible OCS dynamics
  reconfig_time_us: 50.0        # MEMS-class reconfig time
  circuit_latency_us: 1.0       # optical fast-path latency
  circuit_bandwidth_gbps: 200.0 # per-circuit optical bandwidth
  placement_strategy: round_robin

runtime:
  mode: ocs_pipeline             # OCS-aware pipelined overlap
  num_steps: 5

# Disable flat delay — OCS provides its own delay model
delay:
  enabled: false
  comm_delay_us: 0
  comm_delay_jitter_us: 0
