# Synthetic MoE config -- mechanism verification with expert parallelism

extends: base

model:
  num_experts: 8          # 8 experts total (2 per rank on 4 ranks)
  experts_per_rank: 2     # each rank owns 2 local experts
  hidden_dim: 64          # tiny for fast iteration
  expert_hidden_mult: 2
  top_k: 1                # single-expert dispatch (top_k>1 requires multi-expert support)

data:
  batch_size: 16
  seq_len: 64
  num_microbatches: 2

routing:
  strategy: "fixed"       # deterministic routing for verification

runtime:
  mode: "serial"          # start with baseline, then switch to overlap
  num_steps: 5

delay:
  enabled: true
  comm_delay_us: 500      # amplify delay so overlap is visible
  comm_delay_jitter_us: 100

profiling:
  export_trace: true
